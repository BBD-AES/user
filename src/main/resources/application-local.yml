server:
  servlet:
    context-path: /user

spring:
  # 커밋 시 삭제
  config:
    import: optional:file:.env[.properties]

  application:
    name: user

  threads:
    virtual:
      enabled: true # 자바 21 버전을 통해서 이번에 버츄얼 스레드도 한번 써보기

  datasource:
    url: ${DB_ENDPOINT}
    username: ${DB_NAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # bbd-security-core와 동일한 Redis를 바라봐야 같은 UserSnapshot key를 삭제할 수 있다.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
      timeout: ${REDIS_COMMAND_TIMEOUT:2s}

  # User DB 변경 이벤트를 ERP Kafka에 발행하고 다시 소비하기 위한 공통 Kafka 설정.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      # leader와 in-sync replica의 확인을 받아 데이터 유실 가능성을 줄인다.
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        # Producer 재시도 과정에서 같은 record가 중복 저장될 가능성을 줄인다.
        enable.idempotence: true
    consumer:
      # record 처리가 성공한 뒤 listener container가 offset을 관리한다.
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      # record 하나의 처리가 끝날 때마다 offset을 commit한다.
      ack-mode: record

  # Gateway 또는 다른 MSA가 Relay한 Keycloak JWT의 issuer를 기준으로 검증한다.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# User 변경 이벤트 기능 설정.
#
# 기본값은 false다.
# Kafka/Redis가 준비되지 않은 상태에서도 기존 User Service가 실행되도록 하고,
# 인프라 준비 후 true로 바꾸면 쌓여 있던 PENDING Outbox부터 발행한다.
bbd:
  user:
    events:
      enabled: ${USER_EVENTS_ENABLED:false}
      # User Service가 발행하고 Snapshot Consumer가 구독하는 topic.
      topic: ${USER_CHANGED_TOPIC:erp.user.changed.v1}
      # UserSnapshot 무효화 Consumer group.
      snapshot-consumer-group: ${USER_SNAPSHOT_CONSUMER_GROUP:user-snapshot-projector-v1}
      # DLT에서 Redis 삭제를 복구하는 Consumer group.
      dlt-recovery-consumer-group: ${USER_DLT_RECOVERY_CONSUMER_GROUP:user-snapshot-dlt-recovery-v1}
      dlt-suffix: ${USER_EVENT_DLT_SUFFIX:.DLT}
      # 원본 topic과 DLT는 partition 수가 같아야 한다.
      topic-partitions: ${USER_EVENT_TOPIC_PARTITIONS:1}
      topic-replicas: ${USER_EVENT_TOPIC_REPLICAS:1}
      # bbd-security-core의 기본 cache key prefix와 반드시 같아야 한다.
      cache-key-prefix: ${USER_SNAPSHOT_CACHE_KEY_PREFIX:user:snapshot:}
      # 한 polling에서 lock해서 처리할 Outbox 최대 개수.
      outbox-batch-size: ${USER_OUTBOX_BATCH_SIZE:100}
      # polling 실행이 끝난 뒤 다음 실행까지 기다리는 시간.
      publish-delay-ms: ${USER_OUTBOX_PUBLISH_DELAY_MS:1000}
      # Kafka send 결과를 기다리는 최대 시간.
      send-timeout-ms: ${USER_EVENT_SEND_TIMEOUT_MS:5000}
      # 메인 Consumer는 1초 간격으로 3회 재시도 후 DLT로 보낸다.
      consumer-retry-delay-ms: ${USER_EVENT_CONSUMER_RETRY_DELAY_MS:1000}
      consumer-retry-max-attempts: ${USER_EVENT_CONSUMER_RETRY_MAX_ATTEMPTS:3}
      # DLT Consumer는 Redis 복구 시까지 30초 간격으로 계속 재시도한다.
      dlt-recovery-delay-ms: ${USER_EVENT_DLT_RECOVERY_DELAY_MS:30000}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

# Swagger
springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
    config-url: /user/v3/api-docs/swagger-config
    url: /user/v3/api-docs
