server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /user

spring:
  # 로컬 개발/온프레미스 compose 실행 시 .env 사용 가능
  config:
    import: optional:file:.env[.properties]

  application:
    name: user

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_ENDPOINT}
    username: ${DB_NAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:bbd-redis}
      port: ${REDIS_PORT:6379}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
      timeout: ${REDIS_COMMAND_TIMEOUT:2s}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
    consumer:
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        jdbc:
          time_zone: Asia/Seoul

bbd:
  user:
    scim:
      enabled: ${SCIM_ENABLED:false}
      allowed-client-common-name: ${SCIM_CLIENT_COMMON_NAME:midpoint}
      required-role: ${SCIM_REQUIRED_ROLE:SCIM_CLIENT}

    events:
      enabled: ${USER_EVENTS_ENABLED:false}
      topic: ${USER_CHANGED_TOPIC:erp.user.changed.v1}
      snapshot-consumer-group: ${USER_SNAPSHOT_CONSUMER_GROUP:user-snapshot-projector-v1}
      dlt-recovery-consumer-group: ${USER_DLT_RECOVERY_CONSUMER_GROUP:user-snapshot-dlt-recovery-v1}
      dlt-suffix: ${USER_EVENT_DLT_SUFFIX:.DLT}
      topic-partitions: ${USER_EVENT_TOPIC_PARTITIONS:1}
      topic-replicas: ${USER_EVENT_TOPIC_REPLICAS:1}
      cache-key-prefix: ${USER_SNAPSHOT_CACHE_KEY_PREFIX:user:snapshot:}
      outbox-batch-size: ${USER_OUTBOX_BATCH_SIZE:100}
      publish-delay-ms: ${USER_OUTBOX_PUBLISH_DELAY_MS:1000}
      send-timeout-ms: ${USER_EVENT_SEND_TIMEOUT_MS:5000}
      consumer-retry-delay-ms: ${USER_EVENT_CONSUMER_RETRY_DELAY_MS:1000}
      consumer-retry-max-attempts: ${USER_EVENT_CONSUMER_RETRY_MAX_ATTEMPTS:3}
      dlt-recovery-delay-ms: ${USER_EVENT_DLT_RECOVERY_DELAY_MS:30000}

  security:
    enabled: false
    user-snapshot-cache-key-prefix: ${USER_SNAPSHOT_CACHE_KEY_PREFIX:user:snapshot:}
    user-snapshot-cache-ttl-seconds: ${USER_SNAPSHOT_CACHE_TTL_SECONDS:300}


management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
    config-url: /user/v3/api-docs/swagger-config
    url: /user/v3/api-docs

logging:
  level:
    root: info
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace