server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /user

spring:
  application:
    name: user

  threads:
    virtual:
      enabled: true # 자바 21 버전을 통해서 이번에 버츄얼 스레드도 한번 써보기

  datasource:
    url: ${DB_ENDPOINT}
    username: ${DB_NAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # 배포 환경에서는 MSA들이 사용하는 공통 UserSnapshot Redis 주소를 주입한다.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
      timeout: ${REDIS_COMMAND_TIMEOUT:2s}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:true}

  # MSK 또는 배포 환경 Kafka broker 주소를 KAFKA_BOOTSTRAP_SERVERS로 주입한다.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
    consumer:
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record

  # Keycloak Realm issuer를 환경변수로 주입해 JWT 서명, issuer, 만료를 검증한다.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        show_sql: false
        jdbc:
          time_zone: Asia/Seoul

# 배포도 기본값 false로 시작한다.
# Flyway V3 적용과 Kafka/Redis 네트워크 검증 후 true로 전환하는 단계적 배포를 사용한다.
bbd:
  user:
    # SCIM은 admin-be client credentials JWT와 향후 midPoint mTLS를 함께 지원한다.
    scim:
      enabled: ${SCIM_ENABLED:false}
      allowed-client-common-name: ${SCIM_CLIENT_COMMON_NAME:midpoint}
      required-role: ${SCIM_REQUIRED_ROLE:SCIM_CLIENT}

    events:
      enabled: ${USER_EVENTS_ENABLED:false}
      # ERP 내부 User 변경 event topic.
      topic: ${USER_CHANGED_TOPIC:erp.user.changed.v1}
      topic-partitions: ${USER_EVENT_TOPIC_PARTITIONS:1}
      topic-replicas: ${USER_EVENT_TOPIC_REPLICAS:1}
      # security-core의 bbd.security.user-snapshot-cache-key-prefix와 같은 값 사용.
      cache-key-prefix: ${USER_SNAPSHOT_CACHE_KEY_PREFIX:user:snapshot:}
      outbox-batch-size: ${USER_OUTBOX_BATCH_SIZE:100}
      outbox-max-attempts: ${USER_OUTBOX_MAX_ATTEMPTS:30}
      snapshot-invalidation-batch-size: ${USER_SNAPSHOT_INVALIDATION_BATCH_SIZE:100}
      snapshot-invalidation-max-attempts: ${USER_SNAPSHOT_INVALIDATION_MAX_ATTEMPTS:30}
      snapshot-invalidation-retry-delay-ms: ${USER_SNAPSHOT_INVALIDATION_RETRY_DELAY_MS:5000}
      publish-delay-ms: ${USER_OUTBOX_PUBLISH_DELAY_MS:1000}
      send-timeout-ms: ${USER_EVENT_SEND_TIMEOUT_MS:5000}

  security:
    enabled: false
    user-snapshot-cache-key-prefix: ${USER_SNAPSHOT_CACHE_KEY_PREFIX:user:snapshot:}
    user-snapshot-cache-ttl-seconds: ${USER_SNAPSHOT_CACHE_TTL_SECONDS:300}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

# Swagger
springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
    config-url: /user/v3/api-docs/swagger-config
    url: /user/v3/api-docs


